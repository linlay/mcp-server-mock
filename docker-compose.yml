services:
  mcp-server-mock:
    image: mcp-server-mock
    container_name: mcp-server-mock
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-11969}:${SERVER_PORT:-8080}"
    restart: unless-stopped
    networks:
      zenmind-network:
        aliases:
          - mcp-server-mock

networks:
  zenmind-network:
    external: true
