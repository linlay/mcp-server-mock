type: function
name: mock.ops.runbook.generate
description: |
  [MOCK] 根据 message 生成巡检 runbook（伪造数据）。
  用于联调运维场景中的风险级别判断、步骤编排与命令建议生成。
  返回幂等随机数据，不代表真实生产巡检结论。
inputSchema:
  type: object
  properties:
    message:
      type: string
      description: "巡检需求或问题描述"
    query:
      type: string
      description: "message 的别名"
    city:
      type: string
      description: "城市名，可选"
  additionalProperties: false
