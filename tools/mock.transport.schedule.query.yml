type: function
name: mock.transport.schedule.query
label: 出行班次查询
description: |
  [MOCK] 根据出发地、目的地和日期生成航班或高铁行程（伪造数据）。
  用于联调出行场景中的班次号、时间计算、状态和登机口/站台展示。
  返回幂等随机数据，不代表真实票务系统返回结果。
afterCallHint: |
  若需要 viewport 渲染，请在最终输出中使用 viewport 代码块。
  type=html, key=show_transport_card。
  若无需渲染，直接使用工具返回的 JSON 结果对象。
inputSchema:
  type: object
  properties:
    type:
      type: string
      description: "交通类型，可选 flight/train 或 航班/高铁"
    fromCity:
      type: string
      description: "出发城市"
    toCity:
      type: string
      description: "目的地城市"
    date:
      type: string
      description: "日期，建议 YYYY-MM-DD"
  additionalProperties: false
