type: function
name: mock.weather.query
description: |
  [MOCK] 根据 city 和 date 查询天气（伪造数据）。
  用于联调时验证参数解析、结构化输出与多语言城市映射行为。
  返回幂等随机数据，不代表真实天气信息。
afterCallHint: |
  若需要 viewport 渲染，请在最终输出中使用 viewport 代码块。
  type=html, key=show_weather_card。
  若无需渲染，直接使用工具返回的 JSON 结果对象。
inputSchema:
  type: object
  properties:
    city:
      type: string
      description: "城市名称"
    date:
      type: string
      description: "日期，要求必须是 YYYY-MM-DD"
  required:
    - city
    - date
  additionalProperties: false
